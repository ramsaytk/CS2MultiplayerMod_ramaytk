# CS2 Multiplayer Mod - German locale (de-DE)

# ============================ Options screen ============================
@settings = CS2 Multiplayer Mod

@tab.General = Allgemein
@tab.Join = Spiel beitreten
@tab.Host = Spiel hosten

@group.General = Allgemein
@group.Status = Status
@group.Session = Sitzungsaktionen
@group.JoinSetup = Server zum Beitreten
@group.JoinAction = Beitreten
@group.HostSetup = Servereinstellungen
@group.HostAction = Hosten starten

# -- Allgemein --
@label.EnableMod = Mod aktivieren
@desc.EnableMod = Schaltet die Multiplayer-Mod ein oder aus.

@label.PlayerName = Spielername
@desc.PlayerName = Der Name, den andere Spieler von dir sehen.

@label.VerboseLogging = Ausführliches Logging
@desc.VerboseLogging = Protokolliert zusätzliche Details zur Fehlersuche (jede Sync-Aktion und die periodische Diagnose). Aus für ruhigere Logs; ein, wenn du ein detailliertes Log zum Teilen brauchst, während du Hilfe bekommst.

@label.NetTraceLogging = Netz-Sync-Tracing
@desc.NetTraceLogging = Erweiterte Diagnose: verfolgt jeden Schritt der Synchronisierung von Straßen/Wegen/Strom/Rohren - wo der Host ein Segment platziert hat, den gesendeten Befehl, was dieses Spiel empfangen hat und wie jedes Segment neu gebaut und übernommen wurde. Sehr gesprächig (und mit kleinen Leistungskosten). Standardmäßig aus und unabhängig vom ausführlichen Logging - nur einschalten, wenn du ein Netz-Sync-Log zum Teilen aufzeichnest.

@label.StatusRole = Rolle
@desc.StatusRole = Ob diese Instanz offline ist, hostet oder als Client beigetreten ist.

@label.StatusState = Verbindung
@desc.StatusState = Aktueller Verbindungszustand oder der letzte Fehler.

@label.StatusPlayers = Spieler
@desc.StatusPlayers = Verbundene Spieler, die diese Sitzung sieht.

@label.StatusAccess = Zugang
@desc.StatusAccess = Ob zum Beitreten das Server-Passwort erforderlich ist.

@label.StatusExposure = Netzwerk
@desc.StatusExposure = Ob der Host auf das LAN beschränkt ist oder Internet-/LAN-Verbindungen akzeptiert.

@label.StatusWorld = Welt
@desc.StatusWorld = Aktueller Lade- bzw. Hosting-Zustand der Host-Welt.

@label.DisconnectButton = Trennen
@desc.DisconnectButton = Verlässt die aktuelle Sitzung und schließt alle Verbindungen.

# -- Beitreten --
@label.ServerAddress = Host-Adresse
@desc.ServerAddress = IP-Adresse oder Hostname des Spielers, der das Spiel hostet (steht beim Start des Hostings in dessen Log).

@label.JoinPort = Port
@desc.JoinPort = TCP-Port des Hosts (Standard 25001). Muss genau dem Port entsprechen, den der Host geöffnet hat.

@label.JoinPassword = Passwort
@desc.JoinPassword = Das Server-Passwort des Hosts, falls eines gesetzt ist. Es wird nie im Klartext übertragen.

@label.JoinStatus = Status
@desc.JoinStatus = Aktueller Verbindungszustand. Beitreten funktioniert aus dem Hauptmenü - die Stadt wird vom Host übertragen.

@label.JoinButton = Sitzung beitreten
@desc.JoinButton = Verbindet dich mit dem obigen Host und lädt dessen Stadt herunter. Funktioniert aus dem Hauptmenü; kein lokaler Spielstand nötig. Gleiche Aktion wie der Dialog „Spiel beitreten“ im Hauptmenü.

@label.JoinDisconnectButton = Trennen
@desc.JoinDisconnectButton = Verlässt die aktuelle Sitzung und schließt alle Verbindungen.

# -- Hosten --
@label.HostPort = Zu öffnender Port
@desc.HostPort = TCP-Port, auf dem dein Server lauscht (1-65535, Standard 25001). Beitretende Spieler müssen genau diesen Port eingeben. Für Internet-Spiele leite diesen TCP-Port auf deinem Router an diesen PC weiter und erlaube ihn in der Windows-Firewall.

@label.HostPassword = Server-Passwort
@desc.HostPassword = Spieler müssen dieses Passwort eingeben, um beizutreten (es wird nie im Klartext übertragen). Für Internet-Spiele dringend empfohlen - ohne Passwort kann jeder, der den Port findet, beitreten und deine Stadt herunterladen.

@label.LanOnly = Nur LAN
@desc.LanOnly = Akzeptiert nur Spieler aus deinem lokalen Netzwerk. Standardmäßig aus, damit Freunde über das Internet beitreten können (Portweiterleitung nötig). Für Internet-Spiele wird ein starkes Passwort dringend empfohlen.

@label.MaxPlayers = Max. Spieler
@desc.MaxPlayers = Maximale Anzahl gleichzeitiger Spieler inklusive dir (2-32).

@label.ResyncMinutes = Welt-Neusynchronisierung (Minuten)
@desc.ResyncMinutes = Wie oft die komplette Welt neu gespeichert und an die Clients übertragen wird, um Abweichungen zu korrigieren. Niedriger = konsistenter, aber mehr Ladepausen.

@label.HostStatus = Hosting-Zustand
@desc.HostStatus = Hosten braucht eine geladene Stadt: Deine Stadt ist die Welt, in der alle spielen.

@label.HostButton = Sitzung hosten
@desc.HostButton = Öffnet deine aktuelle Stadt als Server auf dem obigen Port. Das Log listet die genauen Adressen auf, die andere Spieler verwenden können. Beitretende Spieler erhalten die Karte automatisch.

@label.SyncWorldButton = Welt synchronisieren
@desc.SyncWorldButton = Sendet deine Stadt jetzt erneut an alle verbundenen Spieler und ersetzt deren Kopie. Damit lassen sich Abweichungen zwischen den Spielern beheben. Entspricht der Schaltfläche „Welt synchronisieren“ im Mehrspieler-Panel im Spiel - hier als Ausweichmöglichkeit, falls die Schaltfläche dort fehlt.

