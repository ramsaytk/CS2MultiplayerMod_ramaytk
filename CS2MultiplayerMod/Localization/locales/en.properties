# CS2 Multiplayer Mod - English locale (en-US)
#
# Format: one "key = value" per line. Blank lines and lines starting with '#'
# are ignored. The value is everything after the FIRST '=' (so values may
# contain '='). Values are single-line plain text; {0}, {1}, ... are runtime
# placeholders and MUST match the other languages' placeholders for the same key.
#
# Keys beginning with '@' are options-screen entries resolved against the game's
# settings ID scheme by PropertiesLocaleSource:
#   @settings        -> the mod's options page title
#   @tab.<Name>      -> a settings tab        (Name = Setting tab const value)
#   @group.<Name>    -> a settings group      (Name = Setting group const value)
#   @label.<Prop>    -> an option's label     (Prop = Setting property name)
#   @desc.<Prop>     -> an option's tooltip    (Prop = Setting property name)
# Every other key (CS2MP.*) is a runtime string the mod resolves in code.

# ============================ Options screen ============================
@settings = CS2 Multiplayer Mod

@tab.General = General
@tab.Join = Join Game
@tab.Host = Host Game

@group.General = General
@group.Status = Status
@group.Session = Session Actions
@group.JoinSetup = Server To Join
@group.JoinAction = Join
@group.HostSetup = Server Settings
@group.HostAction = Start Hosting

# -- General tab --
@label.EnableMod = Enable Mod
@desc.EnableMod = Turn the multiplayer mod on or off.

@label.PlayerName = Player Name
@desc.PlayerName = The name other players see for you.

@label.VerboseLogging = Verbose Logging
@desc.VerboseLogging = Log extra detail for troubleshooting (every sync action and the periodic diagnostics). Leave off for quieter logs; turn it on when you want a detailed log to share while getting help.

@label.NetTraceLogging = Net Sync Tracing
@desc.NetTraceLogging = Advanced diagnostic: trace every step of road/path/power/pipe syncing - where the host placed a segment, the command sent, what this game received, and how each segment was rebuilt and committed. Very chatty (and a small performance cost). Off by default, and separate from Verbose Logging - turn it on only when capturing a net-sync log to share.

@label.StatusRole = Role
@desc.StatusRole = Whether this instance is offline, hosting, or joined as a client.

@label.StatusState = Connection
@desc.StatusState = Current connection state or the last offline fault.

@label.StatusPlayers = Players
@desc.StatusPlayers = Connected players visible to this session.

@label.StatusAccess = Access
@desc.StatusAccess = Whether joining requires the server password.

@label.StatusExposure = Network
@desc.StatusExposure = Whether the host is limited to LAN or accepts internet/LAN connections.

@label.StatusWorld = World
@desc.StatusWorld = Current host-world loading or hosting state.

@label.DisconnectButton = Disconnect
@desc.DisconnectButton = Leave the current session and close all connections.

# -- Join tab --
@label.ServerAddress = Host Address
@desc.ServerAddress = IP address or hostname of the player hosting the game (they see it in their log when hosting starts).

@label.JoinPort = Port
@desc.JoinPort = TCP port of the host (default 25001). Must match the port the host opened.

@label.JoinPassword = Password
@desc.JoinPassword = The host's server password, if one is set. It is never sent in plain text.

@label.JoinStatus = Status
@desc.JoinStatus = Current connection state. Joining works from the main menu - the city is streamed from the host.

@label.JoinButton = Join Session
@desc.JoinButton = Connect to the host above and download their city. Works from the main menu; no local save needed. Same action as the main-menu Join Game dialog.

@label.JoinDisconnectButton = Disconnect
@desc.JoinDisconnectButton = Leave the current session and close all connections.

# -- Host tab --
@label.HostPort = Port To Open
@desc.HostPort = TCP port your server listens on (1-65535, default 25001). Players who join must enter exactly this port. For internet play, forward this TCP port on your router to this PC and allow it through the Windows Firewall.

@label.HostPassword = Server Password
@desc.HostPassword = Players must enter this to join (it is never sent in plain text). Strongly recommended for internet play - without one, anyone who finds the port can join and download your city.

@label.LanOnly = LAN Only
@desc.LanOnly = Only accept players from your local network. Off by default so friends can join over the internet (requires the port forward). A strong password is strongly recommended for internet play.

@label.MaxPlayers = Max Players
@desc.MaxPlayers = Maximum simultaneous players including you (2-32).

@label.ResyncMinutes = World Re-sync (minutes)
@desc.ResyncMinutes = How often the full world is re-saved and streamed to clients to correct any drift. Lower = more consistent but more loading pauses.

@label.HostStatus = Hosting State
@desc.HostStatus = Hosting needs a loaded city: your city is the world everyone plays in.

@label.HostButton = Host Session
@desc.HostButton = Open your current city as a server on the port above. The log lists the exact addresses other players can use. Connecting players receive the map automatically.

@label.SyncWorldButton = Sync World
@desc.SyncWorldButton = Resend your city to every connected player now, replacing their copy. Use this to clear any drift between players. Same as the in-game multiplayer panel's Sync World button - kept here as a fallback in case that panel's button is missing.

